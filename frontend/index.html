<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0&icon_names=send"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="css/style.css" />
        <title>Chat</title>
    </head>
    <body>
        <main id="container">
            <section class="login">
                <h2>Login</h2>
                <form class="login__form">
                    <input
                        type="text"
                        class="login__input"
                        placeholder="Seu nome"
                        minlength="2"
                        maxlength="12"
                    />
                    <button type="submit" class="login__button">Entrar</button>
                    <span class="error-message"></span>
                </form>
            </section>

            <section class="chat">
                <header class="chat__header">
                    <span class="users-connected"></span>
                    <div>
                        <div class="online__icon"></div>
                        <span class="number-users-connected"></span>
                    </div>
                </header>

                <section class="chat__messages"></section>

                <form class="chat__form">
                    <div class="response__container"></div>

                    <div class="input__container">
                        <input
                            type="text"
                            class="chat__input"
                            placeholder="Mensagem..."
                            required
                        />
                        <button type="submit" class="chat__button">
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </div>
                </form>
            </section>
        </main>
        <script type="module" src="js/script.js"></script>
    </body>
</html>
